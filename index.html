<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmaps · Inicio</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body class="home">

<div class="home-top">
  <div class="ht-brand">
    <h1>Roadmaps del equipo</h1>
    <p>Abre un roadmap para verlo o editarlo, o crea uno nuevo.</p>
  </div>
  <div class="spacer"></div>
  <div class="master-box" id="masterBox">
    <span class="mb-ico">🔑</span>
    <input id="masterPass" type="password" placeholder="Clave madre" autocomplete="current-password">
    <span class="master-msg" id="masterMsg"></span>
    <button class="icon-btn" id="masterUnlock" type="button">Desbloquear todo</button>
  </div>
</div>

<div class="home-wrap">
  <div class="home-status" id="homeStatus" role="status" aria-live="polite" hidden>
    <span id="homeStatusText"></span>
    <button class="btn btn-ghost" id="homeRetry" type="button">Reintentar</button>
  </div>
  <div class="cards" id="cards">
    <div class="card new-card" id="newCard">
      <div class="plus">+</div>
      <div class="nc-t">Nuevo roadmap</div>
      <div class="c-sub" style="padding:0">Crea uno desde cero</div>
    </div>
  </div>
</div>

<!-- modal: nuevo roadmap -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <h3>Nuevo roadmap</h3>
    <div class="field"><label>Nombre</label><input id="nrName" type="text" placeholder="Ej. Roadmap 2026 · Falabella.com"></div>
    <div class="field"><label>Clave de edición</label><input id="nrPass" type="password" placeholder="La clave que quieras" autocomplete="new-password"></div>
    <div class="field"><label>Repetir clave</label><input id="nrPass2" type="password" placeholder="Repítela para evitar errores" autocomplete="new-password"></div>
    <div class="err" id="nrErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="nrCancel">Cancelar</button>
      <button class="btn btn-ok" id="nrCreate">Crear y abrir</button>
    </div>
  </div>
</div>

<!-- modal: desbloquear un roadmap -->
<div class="modal-bg" id="accessModal">
  <div class="modal">
    <h3 id="accessTitle">Desbloquear roadmap</h3>
    <p id="accessText">Ingresa la clave de este roadmap o la clave madre.</p>
    <div class="field"><label>Clave</label><input id="accessPass" type="password" autocomplete="current-password"></div>
    <div class="err" id="accessErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="accessCancel">Cancelar</button>
      <button class="btn btn-ok" id="accessSubmit">Desbloquear</button>
    </div>
  </div>
</div>

<div class="sig"><b>Hecho por Juan Carlos Ferrer</b><br>Ideado por Violeta Echaurren</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="js/core.js"></script>
<script src="js/home.js"></script>
</body>
</html>
